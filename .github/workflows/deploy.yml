name: Deploy to AWS

on:
  push:
    branches:
      - feature/working-backend-frontend-setup

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/Single_Vendor_Store

            git fetch origin
            git reset --hard origin/feature/working-backend-frontend-setup

            cd backend
            npm install
            pm2 restart backend --update-env

            cd ../frontend
            mkdir -p src/environments
            npm install
            npm run build

            sudo systemctl restart nginx