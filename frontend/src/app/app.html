<app-header></app-header>
<app-global-loading></app-global-loading>
<app-global-toast></app-global-toast>
<main class="min-h-[calc(100vh-64px)]">
  @if (isNavigating()) {
    <div class="pointer-events-none fixed left-0 right-0 top-[72px] z-[75] px-4 sm:px-6 lg:px-8">
      <div class="mx-auto max-w-7xl rounded-full border border-[#e7dac9] bg-white/80 px-3 py-3 shadow-lg backdrop-blur">
        <div class="h-1.5 overflow-hidden rounded-full bg-slate-100">
          <div class="route-progress h-full w-1/3 rounded-full" style="background: linear-gradient(90deg, #6f4e37 0%, #d4a017 100%);"></div>
        </div>
      </div>
    </div>
  }

  <div
    class="transition-all duration-300 ease-out"
    [class.opacity-60]="isNavigating()"
    [class.translate-y-1]="isNavigating()"
  >
    <router-outlet></router-outlet>
  </div>
</main>
<app-footer></app-footer>
